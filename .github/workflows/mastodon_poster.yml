name: EuropeElects → Mastodon Poster

on:
  schedule:
    # Runs every 30 minutes (offset by 15 min from the monitor, so it always
    # runs AFTER the monitor has had a chance to update posts.md)
    
  workflow_dispatch:   # allow manual trigger from the Actions tab

permissions:
  contents: write      # needed to commit last_mastodon_post_id.txt

jobs:
  post-to-mastodon:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # ── 1. Checkout the repository ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: pip install requests

      # ── 4. Run the Mastodon poster ──────────────────────────────────────────
      - name: Post to Mastodon
        env:
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
        run: python mastodon_poster.py

      # ── 5. Commit & push state file ─────────────────────────────────────────
      - name: Commit and push state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add last_mastodon_post_id.txt 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "Nothing changed – no commit needed."
          else
            git commit -m "chore: mastodon post published $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
